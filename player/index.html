<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
    <title>Player Page</title>

		<!-- DEBUGGING -->
    <style>
      .warning, .error {color: red}
      .error {background-color: yellow}
			/*
      body {
          display: flex;
          flex-direction: column;
          font-family: monospace;
          white-space: break-spaces;
      }
			*/
    </style>
		<!-- /DEBUGGING -->
		
		<!-- CSS -->
		<link rel="stylesheet" href="/css/sortable-table.css" type="text/css">
		<link rel="stylesheet" href="/css/br.css" type="text/css">
		<link rel="stylesheet" href="/css/sr-min-mod.css" type="text/css">
		<style> #info {min-height:0;} </style>
		<!-- /CSS -->

		<!-- JS -->
		<script src="/js/tables.js"></script>
    <script>
			(function(){
	      const logHtml = function(cssClass,...args){
	        const ln = document.createElement('div');
	        if(cssClass) ln.classList.add(cssClass);
	        ln.append(document.createTextNode(args.join(' ')));
	        document.body.append(ln);
	      };
				const params = new URL(globalThis.location.href).searchParams;
				const p = params.get("p") ?? 1;// id_team
	      const w = new Worker("worker.js?sqlite3.dir="+encodeURIComponent("/jswasm")+"&p="+p);

				// password management
				let password = document.cookie
					.split("; ")
					.find((row) => row.startsWith("password="))
					?.split("=")[1];
				if (typeof password === 'undefined') {
					password = encodeURIComponent(prompt("Enter passphrase",""));
				}
				document.cookie = "password=" + password +";max-age=34560000;path=/";
				w.postMessage({password: decodeURIComponent(password)});

				let schedule;
				let playerSeasonStats;
				let playerSeasonStatsPost;
				let playerSeasonStatsAll;
				let playerCareerStats;
				let playerCareerStatsPost;
				let playerCareerStatsAll;
	      w.onmessage = function({data}){
	        switch(data.type){
						case 'log':
							logHtml(data.payload.cssClass, ...data.payload.args);
							break;
						case 'passwordReset':
							document.cookie = "password=;max-age=0;path=/";
						case 'schedule':
							schedule = data.payload.arg;
							break;
						case 'playerSeasonStats':
							playerSeasonStats = data.payload.arg;
							break;
						case 'playerSeasonStatsPost':
							playerSeasonStatsPost = data.payload.arg;
							break;
						case 'playerSeasonStatsAll':
							playerSeasonStatsAll = data.payload.arg;
							break;
						case 'playerCareerStats':
							playerCareerStats = data.payload.arg;
							break;
						case 'playerCareerStatsPost':
							playerCareerStatsPost = data.payload.arg;
							break;
						case 'playerCareerStatsAll':
							playerCareerStatsAll = data.payload.arg;

							/* last object returned by worker */
							dartball.printPlayerInfo(playerCareerStats);
							dartball.printTeamSchedule(schedule,playerCareerStatsAll,"table_player_gamelog");
							dartball.printPlayerStats(playerSeasonStats,playerCareerStats);
							dartball.printPlayerStats(playerSeasonStatsPost,playerCareerStatsPost,undefined,"div_players_stats_post");
							dartball.printPlayerStats(playerSeasonStatsAll,playerCareerStatsAll,undefined,"div_players_stats_all");
							break;
						default:
							logHtml('error',"Unhandled message:",data.type);
					};
				}
			})();
		</script>
		<script src="/js/br.js"></script>
		<!--<script src="/js/sr-min.js"></script>-->
		<!-- /JS -->
  </head>
  <body class="br">
		<div id="wrap" style="width:100%">
			<div id="info" class="players">
				<div id="meta">
					<div>
						<h1>Player Name</h1>
					</div>
				</div>
			</div>
			<div id="content" role="main">
				<div id="player_stats" class="table_wrapper tabbed">
					<div class="section_heading players_standard_batting" id="players_stats_sh">
			  		<span class="section_anchor" id="players_stats_link" data-label="Player Stats"></span><h2>Season Stats</h2>
						<div class="section_heading_text sidescroll_note">
							<ul>
								<li>
									<button class="tooltip" type="button" onclick="window.open('/glossary/')">Glossary</button>
								</li>
							</ul>
						</div>
			  	</div>
					<div class="filter switcher">
						<div class="current">
							<a class="sr_preset" href="javascript:void(0)" data-show="reg_season">Regular Season</a>
						</div>
						<div>
							<a class="sr_preset" href="javascript:void(0)" data-show="post_season">Playoffs</a>
						</div>
						<div>
							<a class="sr_preset" href="javascript:void(0)" data-show="combined">Combined</a>
						</div>
					</div>
					<div id="switcher_players_stats" class="switcher_content">
						<div class="table_container current" id="div_players_stats" data-show="reg_season">
						</div>
						<div class="table_container" id="div_players_stats_post" data-show="post_season">
						</div>
						<div class="table_container" id="div_players_stats_all" data-show="combined">
						</div>
					</div>
				</div>
				<div id="all_team_schedule" class="table_wrapper">
					<div class="section_heading assoc_team_schedule" id="team_schedule_sh">
			  		<span class="section_anchor" id="team_schedule_link" data-label="Team Game-by-Game Schedule"></span><h2>Game Log</h2>
						<div class="section_heading_text sidescroll_note">
							<ul>
								<li>
									<button class="tooltip" type="button" onclick="window.open('/glossary/')">Glossary</button>
								</li>
							</ul>
						</div>
			  	</div>
					<div class="table_container" id="div_team_schedule">
					</div>
				</div>
			</div>
		</div>

  </body>
</html>
